<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — VYOM VOID</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #ddd; font-family: system-ui, sans-serif; font-size: 14px; display: flex; min-height: 100vh; }

/* Sidebar */
nav { width: 180px; background: #1a1a1a; border-right: 1px solid #2a2a2a; padding: 16px; flex-shrink: 0; display: flex; flex-direction: column; }
nav .brand { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 24px; }
nav a { display: block; color: #888; text-decoration: none; padding: 8px 10px; border-radius: 6px; margin-bottom: 4px; cursor: pointer; }
nav a:hover, nav a.active { background: #2a2a2a; color: #fff; }
nav .spacer { flex: 1; }
nav .exit { color: #555; font-size: 12px; }

/* Main */
main { flex: 1; padding: 24px; overflow-y: auto; }

/* Views */
.view { display: none; }
.view.active { display: block; }

h2 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 16px; }

/* Stats row */
.stats { display: flex; gap: 12px; margin-bottom: 24px; }
.stat { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px 20px; }
.stat .val { font-size: 22px; font-weight: 700; color: #fff; }
.stat .lbl { font-size: 12px; color: #666; margin-top: 2px; }

/* Panel */
.panel { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 20px; margin-bottom: 20px; }

/* Textarea / Input */
textarea, input, select {
  width: 100%; background: #111; border: 1px solid #333; border-radius: 6px;
  color: #ddd; font-family: inherit; font-size: 14px; padding: 8px 10px; outline: none;
}
textarea:focus, input:focus, select:focus { border-color: #7B2FBE; }
textarea { resize: vertical; min-height: 80px; }

/* Buttons */
button {
  background: #7B2FBE; color: #fff; border: none; border-radius: 6px;
  padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
}
button:hover { background: #6a28a8; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: transparent; border: 1px solid #333; color: #aaa; }
.btn-ghost:hover { border-color: #555; color: #ddd; background: transparent; }
.btn-red { background: #c0392b; }
.btn-red:hover { background: #a93226; }

/* Output */
.output { margin-top: 16px; display: none; }
.out-block { margin-bottom: 16px; }
.out-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.out-text { background: #111; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px; color: #ccc; line-height: 1.6; white-space: pre-wrap; font-size: 13px; }

/* History */
.history-item { padding: 10px; border: 1px solid #2a2a2a; border-radius: 6px; margin-bottom: 8px; cursor: pointer; }
.history-item:hover { border-color: #444; background: #1f1f1f; }
.history-item .meta { font-size: 11px; color: #555; margin-bottom: 4px; }
.history-item .title { font-size: 13px; color: #ccc; }
.history-item .snippet { font-size: 12px; color: #555; margin-top: 4px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

/* Table */
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 8px 10px; font-size: 11px; color: #555; text-transform: uppercase; border-bottom: 1px solid #2a2a2a; }
td { padding: 10px; border-bottom: 1px solid #1f1f1f; font-size: 13px; vertical-align: middle; }
tr:hover td { background: #1c1c1c; }

/* Status badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-confirmed { background: #1a3a1a; color: #4caf50; }
.badge-pending { background: #2a2a1a; color: #f0c040; }
.badge-shipped { background: #1a2a3a; color: #4fc3f7; }
.badge-processing { background: #2a1a2a; color: #ce93d8; }

/* Order status select */
select.status-sel { background: #1a1a1a; border: 1px solid #333; color: #ccc; padding: 4px 8px; border-radius: 4px; font-size: 12px; width: auto; }

/* Collections grid */
.col-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.col-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px; }
.col-card .name { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }
.col-card .date { font-size: 11px; color: #555; margin-bottom: 12px; }

/* Image gen */
.gen-btns { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
#generated-image { max-width: 300px; border-radius: 8px; border: 1px solid #2a2a2a; margin-top: 8px; }
</style>
</head>
<body>

<nav>
  <div class="brand">VYOM VOID</div>
  <a class="active" onclick="showView('factory', this)">AI Factory</a>
  <a onclick="showView('orders', this)">Orders</a>
  <a onclick="showView('collections', this)">Collections</a>
  <div class="spacer"></div>
  <a href="/admin/inventory">Inventory</a>
  <a href="/admin/design-studio">Design Studio</a>
  <a href="/" class="exit">← Store</a>
</nav>

<main>

  <!-- AI FACTORY -->
  <div id="view-factory" class="view active">
    <h2>AI Factory <span style="font-size:13px;color:#555;font-weight:400;" id="history-count"></span></h2>
    <div style="display:grid;grid-template-columns:1.2fr 0.8fr;gap:20px;">
      <div class="panel">
        <textarea id="trend-input" placeholder="Enter trend or concept… e.g. Dark Indian Cosmic Minimalism"></textarea>
        <div style="margin-top:10px;">
          <button id="gen-all-btn" onclick="generateDrop()">Generate Full Drop</button>
        </div>

        <div id="factory-output" class="output">
          <div class="out-block">
            <div class="out-label">Design Brief (Midjourney)</div>
            <div id="brief-out" class="out-text"></div>
          </div>
          <div class="out-block">
            <div class="out-label">Product Listing</div>
            <div id="listing-out" class="out-text"></div>
          </div>
          <div class="out-block">
            <div class="out-label">Marketing (Instagram)</div>
            <div id="marketing-out" class="out-text"></div>
          </div>

          <div class="out-block" style="border-top:1px solid #2a2a2a;padding-top:16px;margin-top:8px;">
            <div class="out-label">Generate Design Image</div>
            <div class="gen-btns">
              <button onclick="generateImage('pollinations')" id="btn-draft">Draft (Pollinations)</button>
              <button onclick="generateImage('huggingface')" style="background:#1a3a4a;color:#4fc3f7;">Refine (HuggingFace)</button>
              <button onclick="generateImage('imagen')" style="background:#2a1a3a;color:#ce93d8;">Hero (Imagen)</button>
            </div>
            <div id="image-output" style="display:none;">
              <img id="generated-image" />
              <p id="image-status" style="font-size:12px;color:#555;margin-top:6px;"></p>
            </div>
          </div>
        </div>
      </div>

      <div>
        <div style="font-size:12px;color:#555;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;">Archive</div>
        <div id="history-list"></div>
      </div>
    </div>
  </div>

  <!-- ORDERS -->
  <div id="view-orders" class="view">
    <h2>Orders</h2>
    <div class="stats" id="order-stats"></div>
    <div class="panel" style="padding:0;overflow:hidden;">
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Update</th>
          </tr>
        </thead>
        <tbody id="orders-body"></tbody>
      </table>
    </div>
  </div>

  <!-- COLLECTIONS -->
  <div id="view-collections" class="view">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h2 style="margin:0;">Collections</h2>
      <button onclick="createCollection()">+ New</button>
    </div>
    <div class="col-grid" id="collections-list"></div>
  </div>

</main>

<script>
let allOrders = [], allHistory = [];

function showView(id, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  if (id === 'factory') loadHistory();
  if (id === 'orders') loadOrders();
  if (id === 'collections') loadCollections();
}

async function loadHistory() {
  const res = await fetch('/api/history');
  allHistory = await res.json();
  document.getElementById('history-count').textContent = `(${allHistory.length})`;
  document.getElementById('history-list').innerHTML = allHistory.map(h => `
    <div class="history-item" onclick="viewHistoryItem('${h.id}')">
      <div class="meta">${h.type} · ${new Date(h.timestamp).toLocaleDateString()}</div>
      <div class="title">${h.trend}</div>
      <div class="snippet">${h.content}</div>
    </div>
  `).join('') || '<div style="color:#555;font-size:13px;">No history yet.</div>';
}

async function generateDrop() {
  const trend = document.getElementById('trend-input').value.trim();
  if (!trend) return alert('Enter a trend first.');
  const btn = document.getElementById('gen-all-btn');
  btn.disabled = true; btn.textContent = 'Generating…';
  const out = document.getElementById('factory-output');
  out.style.display = 'block';
  ['brief-out','listing-out','marketing-out'].forEach(id => document.getElementById(id).textContent = 'Loading…');

  const prompt = `You are the Head Creative of VYOM VOID (Luxury Indian Streetwear). Trend: ${trend}. Generate a FULL BRAND PACKAGE separated by '|||'. Part 1: DESIGN BRIEF (Midjourney V6 prompt). ||| Part 2: PRODUCT LISTING (2 paragraphs, 5 specs, 10 SEO tags). ||| Part 3: MARKETING SUITE (3 Reel hooks, caption, 5 hashtags). Tone: dark, Sanskrit-inspired, editorial.`;

  try {
    const res = await fetch('/api/ai', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ prompt, trend, type: 'Full Drop' }) });
    const data = await res.json();
    const parts = data.text.split('|||');
    document.getElementById('brief-out').textContent = parts[0]?.trim() || '—';
    document.getElementById('listing-out').textContent = parts[1]?.trim() || '—';
    document.getElementById('marketing-out').textContent = parts[2]?.trim() || '—';
    loadHistory();
  } catch { alert('API error.'); }
  finally { btn.disabled = false; btn.textContent = 'Generate Full Drop'; }
}

function viewHistoryItem(id) {
  const item = allHistory.find(h => h.id === id);
  if (!item) return;
  document.getElementById('trend-input').value = item.trend;
  document.getElementById('factory-output').style.display = 'block';
  document.getElementById('brief-out').textContent = '';
  document.getElementById('listing-out').textContent = item.content;
  document.getElementById('marketing-out').textContent = '';
}

async function generateImage(provider) {
  const prompt = document.getElementById('brief-out').textContent || document.getElementById('trend-input').value;
  if (!prompt) return alert('Generate a drop first.');
  document.getElementById('image-output').style.display = 'block';
  document.getElementById('image-status').textContent = `Generating with ${provider}…`;
  try {
    const res = await fetch('/api/generate-design', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ prompt, provider }) });
    const data = await res.json();
    if (data.imageUrl) {
      document.getElementById('generated-image').src = data.imageUrl;
      document.getElementById('image-status').textContent = `✓ ${data.provider}${data.isFallback ? ' (fallback)' : ''}`;
    } else { document.getElementById('image-status').textContent = 'Failed: ' + (data.error || 'unknown'); }
  } catch (e) { document.getElementById('image-status').textContent = 'Error: ' + e.message; }
}

async function loadOrders() {
  const [statsRes, ordersRes] = await Promise.all([fetch('/api/stats'), fetch('/api/orders')]);
  const stats = await statsRes.json();
  allOrders = await ordersRes.json();

  document.getElementById('order-stats').innerHTML = `
    <div class="stat"><div class="val">${stats.totalOrders}</div><div class="lbl">Total Orders</div></div>
    <div class="stat"><div class="val">₹${stats.totalRevenue.toLocaleString()}</div><div class="lbl">Revenue</div></div>
    <div class="stat"><div class="val">${stats.todayOrders}</div><div class="lbl">Today</div></div>
    <div class="stat"><div class="val">${stats.pending}</div><div class="lbl">Pending</div></div>
  `;

  document.getElementById('orders-body').innerHTML = allOrders.length ? allOrders.map(o => `
    <tr>
      <td style="font-family:monospace;color:#888;font-size:12px;">${o.orderId.substring(0,12)}…</td>
      <td>${o.customer?.fullName || '—'}<br><span style="color:#555;font-size:11px;">${o.customer?.email || ''}</span></td>
      <td style="font-weight:600;color:#fff;">₹${o.totalAmount}</td>
      <td><span class="badge badge-${o.status}">${o.status}</span></td>
      <td>
        <select class="status-sel" onchange="updateStatus('${o.orderId}', this.value)">
          <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
          <option value="processing" ${o.status==='processing'?'selected':''}>Processing</option>
          <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
          <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
        </select>
      </td>
    </tr>
  `).join('') : '<tr><td colspan="5" style="color:#555;text-align:center;padding:20px;">No orders yet.</td></tr>';
}

async function updateStatus(orderId, status) {
  await fetch(`/api/orders/${orderId}/status`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ status }) });
  loadOrders();
}

async function loadCollections() {
  const res = await fetch('/api/collections');
  const data = await res.json();
  document.getElementById('collections-list').innerHTML = data.map(c => `
    <div class="col-card">
      <div class="name">${c.name}</div>
      <div class="date">${new Date(c.createdAt).toLocaleDateString()}</div>
      <button class="btn-red" style="font-size:12px;padding:4px 10px;" onclick="deleteCollection('${c.id}')">Delete</button>
    </div>
  `).join('') || '<div style="color:#555;">No collections.</div>';
}

async function createCollection() {
  const name = prompt('Collection name:');
  if (!name) return;
  await fetch('/api/collections', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name }) });
  loadCollections();
}

async function deleteCollection(id) {
  if (!confirm('Delete this collection?')) return;
  await fetch(`/api/collections/${id}`, { method: 'DELETE' });
  loadCollections();
}

loadHistory();
</script>
</body>
</html>
